name: Deploy showcase

# Builds the Flutter web showcase and deploys it to Firebase Hosting
# (project: akashi-agents → https://akashi.azanello.com).
#
# Requires one repo secret: FIREBASE_SERVICE_ACCOUNT_AKASHI_AGENTS — a Google
# service-account JSON with the "Firebase Hosting Admin" role. The easiest way to
# create it (service account + this secret) is to run, once, from the showcase
# dir: `firebase init hosting:github`. See examples/web_showcase/README.md.

on:
  push:
    branches: [main]
    paths:
      - 'examples/web_showcase/**'
      - 'packages/akashi/**'
      - 'packages/akashi_flutter/**'
      - '.github/workflows/deploy-showcase.yaml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least privilege: deploy reads the repo and authenticates to Firebase via the
# service account (not GITHUB_TOKEN), so it needs no write scope on the repo.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/web_showcase
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release

      # Stamp the build so every commit is a unique Hosting version. Firebase
      # rejects releasing a byte-identical version that is already live
      # (FAILED_PRECONDITION), so a per-commit marker keeps deploys idempotent.
      - name: Stamp build version
        run: |
          printf '{"commit":"%s","run":"%s"}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" > build/web/version.json

      # Deploy with the Firebase CLI directly (via the service account as ADC).
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKASHI_AGENTS }}
        run: |
          printf '%s' "$FIREBASE_SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          set +e
          out=$(npx -y firebase-tools@15 deploy \
            --only hosting --project akashi-agents --non-interactive 2>&1)
          code=$?
          echo "$out"
          # firebase-tools finalizes + promotes the version, then errors on a
          # redundant release ("is the current active version") even though the
          # deploy succeeded. Treat only that benign case as success.
          if [ $code -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "::notice::Version already promoted to live — deploy succeeded."
            exit 0
          fi
          exit $code
