name: akashi_otel
description: >-
  OpenTelemetry tracing for the Akashi agent framework. Implements Akashi's
  Tracer over the opentelemetry package to export the run/step/tool span tree.
version: 0.2.0
repository: https://github.com/Alezanello/akashi_agents/tree/main/packages/akashi_otel
issue_tracker: https://github.com/Alezanello/akashi_agents/issues
topics:
  - ai
  - agents
  - llm
  - opentelemetry

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  akashi: ^0.2.0
  opentelemetry: ^0.18.11

dev_dependencies:
  test: ^1.25.0
