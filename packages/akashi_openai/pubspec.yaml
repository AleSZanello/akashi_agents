name: akashi_openai
description: >-
  OpenAI provider adapter for the Akashi agent framework: wraps openai_dart
  behind Akashi's LanguageModel contract, normalizing streamed content and tool
  calls into its union.
version: 0.3.0
repository: https://github.com/AleSZanello/akashi_agents/tree/main/packages/akashi_openai
issue_tracker: https://github.com/AleSZanello/akashi_agents/issues
topics:
  - ai
  - agents
  - llm
  - openai

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  akashi: ^0.3.0
  openai_dart: ^7.0.0

dev_dependencies:
  http: ^1.2.0
  test: ^1.25.0
