name: akashi_gemma
description: >-
  On-device LanguageModel for the Akashi agent framework, backed by
  flutter_gemma. Proves the LanguageModel contract is not HTTP-bound: run agents
  fully offline, or as the primary in a cloud FallbackModel.
version: 0.3.0
repository: https://github.com/Alezanello/akashi_agents/tree/main/packages/akashi_gemma
issue_tracker: https://github.com/Alezanello/akashi_agents/issues
topics:
  - ai
  - agents
  - on-device
  - gemma

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

# Standalone resolution (not a workspace member): depends on the Flutter SDK and
# flutter_gemma, so it resolves with `flutter pub get` and overrides `akashi`
# onto local source.
dependencies:
  akashi: ^0.3.0
  flutter:
    sdk: flutter
  flutter_gemma: ^1.1.2
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  akashi:
    path: ../akashi
