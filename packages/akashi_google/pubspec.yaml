name: akashi_google
description: >-
  Google Gemini provider adapter for the Akashi agent framework: wraps
  googleai_dart behind Akashi's LanguageModel contract, with structured output,
  tool calls, and embeddings.
version: 0.3.1
repository: https://github.com/AleSZanello/akashi_agents/tree/main/packages/akashi_google
issue_tracker: https://github.com/AleSZanello/akashi_agents/issues
topics:
  - ai
  - agents
  - llm
  - gemini

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  akashi: ^0.3.0
  googleai_dart: ^8.0.0

dev_dependencies:
  http: ^1.2.0
  test: ^1.25.0
