name: akashi_flutter
description: >-
  Reactive Flutter integration for the Akashi agent framework: an
  AgentController, AgentBuilder, message/part renderer, and Isolate offload for
  streaming agents in your UI.
version: 0.3.0
repository: https://github.com/Alezanello/akashi_agents/tree/main/packages/akashi_flutter
issue_tracker: https://github.com/Alezanello/akashi_agents/issues
topics:
  - ai
  - agents
  - flutter
  - llm

environment:
  sdk: ^3.9.0
  flutter: ">=3.10.0"

# Standalone resolution (not a workspace member): depends on the Flutter SDK, so
# it resolves with `flutter pub get` and overrides `akashi` onto local source.
dependencies:
  akashi: ^0.3.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  akashi:
    path: ../akashi
