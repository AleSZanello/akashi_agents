name: akashi_mcp
description: >-
  Model Context Protocol (MCP) tools for the Akashi agent framework: connect to
  an MCP server via dart_mcp and expose its tools as Akashi tools an agent can
  call.
version: 0.3.0
repository: https://github.com/Alezanello/akashi_agents/tree/main/packages/akashi_mcp
issue_tracker: https://github.com/Alezanello/akashi_agents/issues
topics:
  - ai
  - agents
  - llm
  - mcp

environment:
  sdk: ^3.7.0

resolution: workspace

dependencies:
  akashi: ^0.3.0
  dart_mcp: ^0.5.1
  stream_channel: ^2.1.4

dev_dependencies:
  test: ^1.25.0
